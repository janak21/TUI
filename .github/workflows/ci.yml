name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e .

      - name: Syntax check (all modules)
        run: python -m py_compile tui/__init__.py tui/__main__.py tui/cli.py tui/utils.py tui/modules/aws.py tui/modules/docker.py tui/modules/hadoop.py tui/modules/kubernetes.py tui/modules/linux.py tui/modules/lvm.py tui/modules/webserver.py

      - name: Run smoke tests
        run: python tests/smoke_test.py
